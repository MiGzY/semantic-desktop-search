name: Run My Script

on:
  push:                  # Runs on every push
  workflow_dispatch:     # Adds a manual "Run" button in the UI

jobs:
  run-script:
    runs-on: ubuntu-latest   # GitHub's server (Ubuntu)
    steps:
      - uses: actions/checkout@v3   # Checks out your repo files
      - name: Run script
        run: bash ./start.sh
